name: Bug report
description: Report a reproducible defect in memlocal_core.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please include a minimal reproduction and avoid posting secrets, private memory data, or raw credentials.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is failing?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: What exact steps reproduce the issue?
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, crate version or commit, enabled features.
      placeholder: macOS 15, rustc 1.94, main@abcdef, feature=http
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, backtraces, or output.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and private data from the report.
          required: true
