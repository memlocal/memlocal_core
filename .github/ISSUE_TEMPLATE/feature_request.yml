name: Feature request
description: Propose a new capability or significant improvement.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve?
      placeholder: I need to ... because ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other approaches did you evaluate?

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: API surface, performance, memory model, benchmarks, or maintenance cost.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and discussions first.
          required: true
